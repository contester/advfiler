syntax = "proto3";

option go_package = "github.com/contester/advfiler/protos";

package protos;

message Digests {
    bytes sha1 = 1;
    bytes md5 = 2;
    bytes sha256 = 3;
}

message DirectoryEntry {
    bytes blake3_hash = 1;
    string module_type = 2;
    int64 last_modified_timestamp = 3;
    Digests digests = 4;
    int64 data_size = 5;
    bool external = 6;
}

message PathList {
    repeated string paths = 1;
}

message HashEntry {
    oneof state {
        PathList inline_paths = 1;
        int64 refcount = 2;
    }
}

enum AuthAction {
    A_NONE = 0;
    A_READ = 1;
    A_WRITE = 2;
}

message Asset {
    string name = 1;
    bool truncated = 2;
    bytes data = 3;
    int64 original_size = 4;
}

message TestRecord {
    int64 test_id = 1;
    Asset input = 2;
    Asset output = 3;
    Asset answer = 4;
    Asset tester_output = 5;
}

message TestingRecord {
    Asset solution = 1;
    repeated TestRecord test = 2;
}
