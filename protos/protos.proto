edition = "2024";

option features.utf8_validation = NONE;
option features.enforce_naming_style = STYLE_LEGACY;
option features.default_symbol_visibility = EXPORT_ALL;

option go_package = "github.com/contester/advfiler/protos";
option features.(pb.go).api_level = API_OPAQUE;

package protos;
import "google/protobuf/go_features.proto";

message Digests {
    bytes sha1 = 1;
    bytes md5 = 2;
    bytes sha256 = 3;
}

message DigestsAndSize {
    Digests digests = 1;
    int64 size = 2;
}

message ContestRecord {
    bytes content = 1;
    int64 timestamp_unix = 2;
}

message ProblemRecord {
    bytes content = 1;
    int64 timestamp_unix = 2;
    int64 revision = 3;
}

message DirectoryEntry {
    bytes blake3_hash = 1;
    string module_type = 2;
    int64 last_modified_timestamp = 3;
    // Present only for internal (inline) entries. Absent for external entries
    // (the data lives in a blob and DigestsAndSize is under blobDigestsKey) and
    // for zero-size entries (no blob, digests synthesized on read).
    DigestsAndSize digests_and_size = 4;
}

message PathList {
    repeated string paths = 1;
}

message HashEntry {
    oneof state {
        PathList inline_paths = 1;
        int64 refcount = 2;
    }
}

enum AuthAction {
    A_NONE = 0;
    A_READ = 1;
    A_WRITE = 2;
}

message Asset {
    string name = 1;
    bool truncated = 2;
    bytes data = 3;
    int64 original_size = 4;
}

message TestRecord {
    int64 test_id = 1;
    Asset input = 2;
    Asset output = 3;
    Asset answer = 4;
    Asset tester_output = 5;
}

message TestingRecord {
    Asset solution = 1;
    repeated TestRecord test = 2;
}
